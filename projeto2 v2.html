<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #f4f7f6;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      max-width: 520px;
      width: 100%;
    }

    h1 {
      color: #2c3e50;
      font-size: 24px;
      text-align: center;
      margin-bottom: 4px;
    }

    p.subtitulo {
      color: #7f8c8d;
      font-size: 13px;
      text-align: center;
      margin-bottom: 22px;
    }

    /* Abas */
    .abas {
      display: flex;
      border-bottom: 2px solid #ecf0f1;
      margin-bottom: 20px;
    }

    .aba {
      flex: 1;
      padding: 10px 0;
      text-align: center;
      font-size: 14px;
      font-weight: bold;
      color: #95a5a6;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.2s, border-color 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }

    .aba.ativa {
      color: #3498db;
      border-bottom-color: #3498db;
    }

    .aba:hover:not(.ativa) {
      color: #2c3e50;
    }

    .aba-info {
      font-size: 11px;
      color: #bdc3c7;
      display: block;
      font-weight: normal;
    }

    .aba.ativa .aba-info {
      color: #7fb3d3;
    }

    /* Formulario */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #bdc3c7;
      border-radius: 6px;
      font-size: 15px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      border-color: #3498db;
      outline: none;
    }

    .row-data {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .row-data select,
    .row-data input[type="date"] {
      flex: 1;
      padding: 8px 10px;
      border: 2px solid #bdc3c7;
      border-radius: 6px;
      font-size: 14px;
      color: #34495e;
      background: white;
      transition: border-color 0.3s;
    }

    .row-data select:focus,
    .row-data input[type="date"]:focus {
      border-color: #3498db;
      outline: none;
    }

    button.btn-add {
      padding: 10px 18px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
      white-space: nowrap;
    }

    button.btn-add:hover {
      background-color: #2980b9;
    }

    /* Filtros */
    .filtros {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filtros button {
      flex: 1;
      padding: 7px;
      border: 2px solid #bdc3c7;
      border-radius: 6px;
      background: white;
      color: #7f8c8d;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filtros button.ativo {
      border-color: #3498db;
      color: #3498db;
      font-weight: bold;
    }

    /* Lista */
    ul#lista {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 60px;
    }

    li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      border: 1.5px solid #ecf0f1;
      border-radius: 8px;
      background: #fafafa;
      transition: opacity 0.2s;
    }

    li.concluida {
      opacity: 0.55;
    }

    li.concluida .texto-tarefa {
      text-decoration: line-through;
      color: #95a5a6;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #2ecc71;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .tarefa-corpo {
      flex: 1;
    }

    .texto-tarefa {
      font-size: 15px;
      color: #2c3e50;
      word-break: break-word;
    }

    .tarefa-meta {
      display: flex;
      gap: 8px;
      margin-top: 5px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    .badge-prioridade-alta   { background: #fdecea; color: #e74c3c; }
    .badge-prioridade-media  { background: #fef9e7; color: #f39c12; }
    .badge-prioridade-baixa  { background: #eafaf1; color: #27ae60; }

    .badge-data {
      background: #eaf4fb;
      color: #2980b9;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .badge-atrasada {
      background: #fdecea;
      color: #e74c3c;
    }

    button.btn-excluir {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 16px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    button.btn-excluir:hover {
      background-color: #fdecea;
    }

    /* Rodape */
    .rodape {
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #95a5a6;
    }

    button.btn-limpar {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 13px;
      cursor: pointer;
      padding: 0;
    }

    button.btn-limpar:hover {
      text-decoration: underline;
    }

    .vazio {
      text-align: center;
      color: #bdc3c7;
      font-size: 14px;
      padding: 28px 0;
    }

    .resumo-abas {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .resumo-card {
      flex: 1;
      background: #f8f9fa;
      border: 1.5px solid #ecf0f1;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .resumo-card .numero {
      font-size: 22px;
      font-weight: bold;
      color: #2c3e50;
    }

    .resumo-card .label {
      font-size: 11px;
      color: #95a5a6;
      margin-top: 2px;
    }

    .resumo-card.destaque .numero { color: #3498db; }
    .resumo-card.alerta   .numero { color: #e74c3c; }
  </style>
</head>
<body>
<div class="container">

  <h1>To-Do List</h1>
  <p class="subtitulo">Organize suas tarefas por prazo</p>

  <!-- Cards de resumo -->
  <div class="resumo-abas">
    <div class="resumo-card destaque">
      <div class="numero" id="res-hoje">0</div>
      <div class="label">Hoje</div>
    </div>
    <div class="resumo-card">
      <div class="numero" id="res-semana">0</div>
      <div class="label">Esta semana</div>
    </div>
    <div class="resumo-card">
      <div class="numero" id="res-mes">0</div>
      <div class="label">Este mes</div>
    </div>
    <div class="resumo-card alerta">
      <div class="numero" id="res-atrasadas">0</div>
      <div class="label">Atrasadas</div>
    </div>
  </div>

  <!-- Formulario -->
  <div class="input-row">
    <input type="text" id="inputTarefa" placeholder="Digite uma nova tarefa...">
    <button class="btn-add" onclick="adicionarTarefa()">Adicionar</button>
  </div>
  <div class="row-data">
    <select id="prioridade">
      <option value="media">Prioridade: Media</option>
      <option value="alta">Prioridade: Alta</option>
      <option value="baixa">Prioridade: Baixa</option>
    </select>
    <input type="date" id="dataVencimento">
  </div>

  <!-- Abas -->
  <div class="abas">
    <button class="aba ativa" id="aba-hoje"   onclick="mudarAba('hoje')">
      Hoje
      <span class="aba-info">tarefas do dia</span>
    </button>
    <button class="aba" id="aba-semana" onclick="mudarAba('semana')">
      Semana
      <span class="aba-info">proximos 7 dias</span>
    </button>
    <button class="aba" id="aba-mes"    onclick="mudarAba('mes')">
      Mes
      <span class="aba-info">proximos 30 dias</span>
    </button>
    <button class="aba" id="aba-todas"  onclick="mudarAba('todas')">
      Todas
      <span class="aba-info">sem filtro</span>
    </button>
  </div>

  <!-- Filtros de status -->
  <div class="filtros">
    <button id="filtro-todas"     class="ativo" onclick="filtrar('todas')">Todas</button>
    <button id="filtro-pendentes"             onclick="filtrar('pendentes')">Pendentes</button>
    <button id="filtro-concluidas"            onclick="filtrar('concluidas')">Concluidas</button>
  </div>

  <ul id="lista"></ul>

  <div class="rodape">
    <span id="contador">0 tarefa(s) pendente(s)</span>
    <button class="btn-limpar" onclick="limparConcluidas()">Limpar concluidas</button>
  </div>

</div>

<script>
  // ---- Estado ----
  let tarefas = [];
  let abaAtual = 'hoje';
  let filtroAtual = 'todas';

  // ---- Data helpers ----
  function hoje() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function addDias(n) {
    const d = new Date();
    d.setDate(d.getDate() + n);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function formatarData(iso) {
    if (!iso) return '';
    const [a, m, d] = iso.split('-');
    return `${d}/${m}/${a}`;
  }

  function isAtrasada(t) {
    return t.data && !t.concluida && t.data < hoje();
  }

  // ---- Filtro por aba ----
  function filtrarPorAba(lista) {
    const hj = hoje();
    const fim7  = addDias(7);
    const fim30 = addDias(30);

    if (abaAtual === 'hoje')
      return lista.filter(t => !t.data || t.data === hj || isAtrasada(t));
    if (abaAtual === 'semana')
      return lista.filter(t => !t.data || (t.data >= hj && t.data <= fim7) || isAtrasada(t));
    if (abaAtual === 'mes')
      return lista.filter(t => !t.data || (t.data >= hj && t.data <= fim30) || isAtrasada(t));
    return lista; // todas
  }

  // ---- Filtro por status ----
  function filtrarPorStatus(lista) {
    if (filtroAtual === 'pendentes')  return lista.filter(t => !t.concluida);
    if (filtroAtual === 'concluidas') return lista.filter(t =>  t.concluida);
    return lista;
  }

  // ---- Adicionar ----
  function adicionarTarefa() {
    const input = document.getElementById('inputTarefa');
    const texto = input.value.trim();
    if (!texto) { input.focus(); return; }

    const prioridade = document.getElementById('prioridade').value;
    const data       = document.getElementById('dataVencimento').value;

    tarefas.push({ id: Date.now(), texto, concluida: false, prioridade, data });

    input.value = '';
    document.getElementById('dataVencimento').value = '';
    document.getElementById('prioridade').value = 'media';
    input.focus();
    renderizar();
  }

  // ---- Acoes ----
  function alternarConcluida(id) {
    const t = tarefas.find(t => t.id === id);
    if (t) t.concluida = !t.concluida;
    renderizar();
  }

  function excluirTarefa(id) {
    tarefas = tarefas.filter(t => t.id !== id);
    renderizar();
  }

  function limparConcluidas() {
    tarefas = tarefas.filter(t => !t.concluida);
    renderizar();
  }

  function mudarAba(aba) {
    abaAtual = aba;
    document.querySelectorAll('.aba').forEach(b => b.classList.remove('ativa'));
    document.getElementById('aba-' + aba).classList.add('ativa');
    renderizar();
  }

  function filtrar(tipo) {
    filtroAtual = tipo;
    document.querySelectorAll('.filtros button').forEach(b => b.classList.remove('ativo'));
    document.getElementById('filtro-' + tipo).classList.add('ativo');
    renderizar();
  }

  // ---- Renderizar ----
  function renderizar() {
    const lista = document.getElementById('lista');
    const hj = hoje();

    // Resumo dos cards
    document.getElementById('res-hoje').textContent =
      tarefas.filter(t => !t.concluida && (!t.data || t.data === hj)).length;
    document.getElementById('res-semana').textContent =
      tarefas.filter(t => !t.concluida && t.data && t.data >= hj && t.data <= addDias(7)).length;
    document.getElementById('res-mes').textContent =
      tarefas.filter(t => !t.concluida && t.data && t.data >= hj && t.data <= addDias(30)).length;
    document.getElementById('res-atrasadas').textContent =
      tarefas.filter(t => isAtrasada(t)).length;

    // Contador de pendentes geral
    const pendentes = tarefas.filter(t => !t.concluida).length;
    document.getElementById('contador').textContent = pendentes + ' tarefa(s) pendente(s)';

    // Aplicar filtros
    let visiveis = filtrarPorAba(tarefas);
    visiveis = filtrarPorStatus(visiveis);

    // Ordenar: atrasadas primeiro, depois por data, sem data por ultimo
    visiveis.sort((a, b) => {
      const aAt = isAtrasada(a) ? 0 : 1;
      const bAt = isAtrasada(b) ? 0 : 1;
      if (aAt !== bAt) return aAt - bAt;
      if (!a.data && !b.data) return 0;
      if (!a.data) return 1;
      if (!b.data) return -1;
      return a.data.localeCompare(b.data);
    });

    if (visiveis.length === 0) {
      lista.innerHTML = '<p class="vazio">Nenhuma tarefa encontrada nesta visualizacao.</p>';
      return;
    }

    lista.innerHTML = visiveis.map(t => {
      const atrasada = isAtrasada(t);
      const badgePrioridade = `<span class="badge badge-prioridade-${t.prioridade}">${capitalizar(t.prioridade)}</span>`;
      const badgeData = t.data
        ? `<span class="badge badge-data ${atrasada ? 'badge-atrasada' : ''}">
             ${atrasada ? 'Atrasada - ' : ''}${formatarData(t.data)}
           </span>`
        : '';

      return `
        <li class="${t.concluida ? 'concluida' : ''}">
          <input type="checkbox" ${t.concluida ? 'checked' : ''}
                 onchange="alternarConcluida(${t.id})">
          <div class="tarefa-corpo">
            <div class="texto-tarefa">${escapar(t.texto)}</div>
            <div class="tarefa-meta">
              ${badgePrioridade}
              ${badgeData}
            </div>
          </div>
          <button class="btn-excluir" onclick="excluirTarefa(${t.id})" title="Excluir">x</button>
        </li>
      `;
    }).join('');
  }

  function escapar(texto) {
    return texto.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function capitalizar(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
  }

  document.getElementById('inputTarefa').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') adicionarTarefa();
  });

  // Define data padrao do campo como hoje
  document.getElementById('dataVencimento').value = hoje();

  renderizar();
</script>
</body>
</html>
