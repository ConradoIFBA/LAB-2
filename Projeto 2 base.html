<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #f4f7f6;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      max-width: 480px;
      width: 100%;
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 6px;
      font-size: 24px;
      text-align: center;
    }

    p.subtitulo {
      color: #7f8c8d;
      font-size: 14px;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #bdc3c7;
      border-radius: 6px;
      font-size: 15px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      border-color: #3498db;
      outline: none;
    }

    button.btn-add {
      padding: 10px 18px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
      white-space: nowrap;
    }

    button.btn-add:hover {
      background-color: #2980b9;
    }

    .filtros {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filtros button {
      flex: 1;
      padding: 7px;
      border: 2px solid #bdc3c7;
      border-radius: 6px;
      background: white;
      color: #7f8c8d;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filtros button.ativo {
      border-color: #3498db;
      color: #3498db;
      font-weight: bold;
    }

    ul#lista {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1.5px solid #ecf0f1;
      border-radius: 8px;
      background: #fafafa;
      transition: opacity 0.2s;
    }

    li.concluida {
      opacity: 0.6;
    }

    li.concluida .texto-tarefa {
      text-decoration: line-through;
      color: #95a5a6;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #2ecc71;
      cursor: pointer;
      flex-shrink: 0;
    }

    .texto-tarefa {
      flex: 1;
      font-size: 15px;
      color: #2c3e50;
      word-break: break-word;
    }

    button.btn-excluir {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    button.btn-excluir:hover {
      background-color: #fdecea;
    }

    .rodape {
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #95a5a6;
    }

    button.btn-limpar {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 13px;
      cursor: pointer;
      padding: 0;
    }

    button.btn-limpar:hover {
      text-decoration: underline;
    }

    .vazio {
      text-align: center;
      color: #bdc3c7;
      font-size: 14px;
      padding: 24px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>To-Do List</h1>
    <p class="subtitulo">Organize suas tarefas do dia</p>

    <div class="input-row">
      <input type="text" id="inputTarefa" placeholder="Digite uma nova tarefa...">
      <button class="btn-add" onclick="adicionarTarefa()">Adicionar</button>
    </div>

    <div class="filtros">
      <button id="filtro-todas" class="ativo" onclick="filtrar('todas')">Todas</button>
      <button id="filtro-pendentes" onclick="filtrar('pendentes')">Pendentes</button>
      <button id="filtro-concluidas" onclick="filtrar('concluidas')">Concluidas</button>
    </div>

    <ul id="lista"></ul>

    <div class="rodape">
      <span id="contador">0 tarefa(s) pendente(s)</span>
      <button class="btn-limpar" onclick="limparConcluidas()">Limpar concluidas</button>
    </div>
  </div>

  <script>
    let tarefas = [];
    let filtroAtual = 'todas';

    function adicionarTarefa() {
      const input = document.getElementById('inputTarefa');
      const texto = input.value.trim();

      if (!texto) {
        input.focus();
        return;
      }

      tarefas.push({ id: Date.now(), texto: texto, concluida: false });
      input.value = '';
      input.focus();
      renderizar();
    }

    function alternarConcluida(id) {
      const tarefa = tarefas.find(t => t.id === id);
      if (tarefa) tarefa.concluida = !tarefa.concluida;
      renderizar();
    }

    function excluirTarefa(id) {
      tarefas = tarefas.filter(t => t.id !== id);
      renderizar();
    }

    function limparConcluidas() {
      tarefas = tarefas.filter(t => !t.concluida);
      renderizar();
    }

    function filtrar(tipo) {
      filtroAtual = tipo;
      document.querySelectorAll('.filtros button').forEach(b => b.classList.remove('ativo'));
      document.getElementById('filtro-' + tipo).classList.add('ativo');
      renderizar();
    }

    function renderizar() {
      const lista = document.getElementById('lista');
      const pendentes = tarefas.filter(t => !t.concluida).length;

      document.getElementById('contador').textContent =
        pendentes + ' tarefa(s) pendente(s)';

      let visiveis = tarefas;
      if (filtroAtual === 'pendentes')  visiveis = tarefas.filter(t => !t.concluida);
      if (filtroAtual === 'concluidas') visiveis = tarefas.filter(t => t.concluida);

      if (visiveis.length === 0) {
        lista.innerHTML = '<p class="vazio">Nenhuma tarefa encontrada.</p>';
        return;
      }

      lista.innerHTML = visiveis.map(t => `
        <li class="${t.concluida ? 'concluida' : ''}">
          <input type="checkbox" ${t.concluida ? 'checked' : ''}
                 onchange="alternarConcluida(${t.id})">
          <span class="texto-tarefa">${escapar(t.texto)}</span>
          <button class="btn-excluir" onclick="excluirTarefa(${t.id})" title="Excluir">x</button>
        </li>
      `).join('');
    }

    function escapar(texto) {
      return texto.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.getElementById('inputTarefa').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') adicionarTarefa();
    });

    renderizar();
  </script>
</body>
</html>
